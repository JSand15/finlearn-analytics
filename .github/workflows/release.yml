name: Publish to PyPI

# Publishes to PyPI when you push a version tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
# Uses PyPI Trusted Publishing (OIDC) — no API tokens stored in the repo.
# One-time setup on PyPI: Project > Settings > Publishing > add a GitHub publisher
# (owner: JSand15, repo: finlearn-analytics, workflow: release.yml, environment: pypi).

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build distribution
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
